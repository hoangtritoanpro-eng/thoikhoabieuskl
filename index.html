<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- Thư viện xử lý Excel và chụp ảnh -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pangolin&display=swap" rel="stylesheet">
  
  <style>
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    .floating-icon { display: inline-block; animation: float 3s ease-in-out infinite; }
    .floating-icon.delay-1 { animation-delay: 0.5s; }
    .floating-icon.delay-2 { animation-delay: 1s; }

    body { 
      font-family: 'Nunito', sans-serif; margin: 0; padding: 30px 20px; background-color: #f0fdf4; 
      background-image: linear-gradient(to right, rgba(45, 212, 191, 0.2) 1px, transparent 1px), linear-gradient(to bottom, rgba(45, 212, 191, 0.2) 1px, transparent 1px);
      background-size: 35px 35px; color: #334155;
    }
    body::before { content: ""; position: fixed; top: 0; bottom: 0; left: 50px; width: 3px; background-color: #38bdf8; z-index: -1; }
    
    .container { max-width: 1000px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(20, 184, 166, 0.15); border: 3px solid #ccfbf1; position: relative;}
    
    .decal { position: absolute; font-size: 40px; opacity: 0.8; }
    .decal-1 { top: -15px; left: -15px; transform: rotate(-15deg); }
    .decal-2 { top: -15px; right: -15px; transform: rotate(15deg); }

    h2 { text-align: center; color: #0f766e; font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px;}
    .badge { display: inline-block; background: #ccfbf1; color: #0d9488; padding: 8px 20px; border-radius: 30px; font-size: 15px; font-weight: 800; border: 2px dashed #14b8a6; margin-bottom: 30px;}

    .control-panel { background: #f8fafc; border: 2px dashed #99f6e4; border-radius: 20px; padding: 30px; margin-bottom: 20px; text-align: center; }
    input[type="file"] { display: none; }
    
    .upload-btn { background-color: #0ea5e9; color: white; padding: 14px 30px; border-radius: 15px; font-weight: 800; cursor: pointer; display: inline-block; transition: 0.3s; box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3); font-size: 17px;}
    .upload-btn:hover { background-color: #0284c7; transform: translateY(-3px);}
    
    .search-box { display: none; gap: 15px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
    input[type="text"] { padding: 14px 20px; width: 230px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; font-family: 'Nunito'; font-weight: bold; color: #0f766e; background: #fff;}
    input[type="text"]:focus { border-color: #14b8a6; background: #f0fdf4; box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);}
    
    .action-btn { padding: 14px 25px; border: none; border-radius: 12px; background-color: #14b8a6; color: white; font-size: 16px; cursor: pointer; font-weight: 800; transition: 0.3s; box-shadow: 0 6px 15px rgba(20, 184, 166, 0.3);}
    .action-btn:hover { background-color: #0d9488; transform: translateY(-3px);}
    .btn-class { background-color: #f43f5e; box-shadow: 0 6px 15px rgba(244, 63, 94, 0.3);}
    .btn-class:hover { background-color: #e11d48; }

    /* MENU CHỌN GIAO DIỆN */
    .theme-toggle { display: none; justify-content: center; gap: 10px; margin-bottom: 25px; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 20px; width: fit-content; margin-left: auto; margin-right: auto; flex-wrap: wrap;}
    .t-btn { padding: 10px 20px; border: none; background: transparent; color: #64748b; border-radius: 12px; cursor: pointer; font-weight: 800; font-family: 'Nunito'; font-size: 15px; transition: 0.3s;}
    .t-btn.active { background: #14b8a6; color: white; box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3); }

    /* HIỆU ỨNG TƯƠNG TÁC KHI SỬA THỦ CÔNG */
    .editable-cell { transition: all 0.2s ease; outline: none; border-radius: 8px;}
    .editable-cell:hover { background-color: rgba(255, 255, 255, 0.8) !important; cursor: text; box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.1);}
    .editable-cell:focus { background-color: #ffffff !important; box-shadow: inset 0 0 0 2px #0ea5e9;}

    /* ==================================================
       BỘ SƯU TẬP 5 GIAO DIỆN (THEMES)
       ================================================== */
       
    /* 1. GIAO DIỆN BẢN CHUẨN (XANH MINT) */
    .theme-simple { background: white; padding: 25px; border-radius: 20px; border: 2px solid #ccfbf1; position: relative; }
    .theme-simple .tkb-title { color: #0f766e; font-size: 28px; font-weight: 900; text-align: center; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; }
    .theme-simple .info-subtitle { display: none; }
    .theme-simple .doodle { display: none; }
    .theme-simple table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 15px; overflow: hidden; border: 2px solid #ccfbf1; position: relative; z-index: 2;}
    .theme-simple th, .theme-simple td { border: 1px solid #ccfbf1; padding: 15px 10px; text-align: center; }
    .theme-simple th { color: #fff; font-weight: 800; font-size: 17px; background: #14b8a6; }
    .theme-simple td { font-size: 16px; line-height: 1.5; color: #1e293b; font-weight: 800; background: #fff;}
    .theme-simple .time-col { color: #0f766e; background: #f0fdf4;} 
    .theme-simple .break-row td { background-color: #fef3c7; font-weight: 900; color: #d97706; letter-spacing: 3px; font-size: 15px;}
    .theme-simple .break-small td { background-color: #ffedd5; color: #c2410c; letter-spacing: 2px; font-size: 14px;}
    .theme-simple td span.sub-text { font-size: 14px; color: #475569; font-weight: 600; }

    /* 2. GIAO DIỆN BẢN SKETCHNOTE (VÀNG SÁNG TẠO) */
    .theme-infographic {
      background-color: #fffde7; background-image: linear-gradient(#fde68a 2px, transparent 2px), linear-gradient(90deg, #fde68a 2px, transparent 2px); background-size: 30px 30px; padding: 65px 50px; border: 4px solid #0f766e; border-radius: 20px; font-family: 'Pangolin', cursive; position: relative; overflow: hidden;
    }
    .theme-infographic .tkb-title { text-align: center; font-size: 45px; color: #0f766e; margin: 0 0 5px 0; text-shadow: 3px 3px 0px #ccfbf1; position: relative; z-index: 2;}
    .theme-infographic .info-subtitle { text-align: center; font-size: 20px; color: #115e59; margin-bottom: 30px; position: relative; z-index: 2;}
    .theme-infographic table { width: 100%; border-collapse: separate; border-spacing: 12px; position: relative; z-index: 2;}
    .theme-infographic th, .theme-infographic td { border-radius: 15px; padding: 12px 8px; border: 3px solid #0f766e; box-shadow: 4px 4px 0 #0f766e; text-align: center; font-size: 20px; color: #0f172a; font-weight: 900; background: #fff;}
    .theme-infographic th { background-color: #bae6fd; color: #0f172a; } 
    .theme-infographic .time-col { background-color: #ffe4e6; color: #9f1239; font-weight: 900;} 
    .theme-infographic tr td:nth-child(2) { background-color: #ecfdf5; } 
    .theme-infographic tr td:nth-child(3) { background-color: #fef9c3; } 
    .theme-infographic tr td:nth-child(4) { background-color: #f0fdfa; } 
    .theme-infographic tr td:nth-child(5) { background-color: #f3e8ff; } 
    .theme-infographic tr td:nth-child(6) { background-color: #ffedd5; } 
    .theme-infographic .break-row td { background-color: #fb923c !important; color: white; text-shadow: 2px 2px 0 #c2410c; letter-spacing: 4px; font-size: 22px;}
    .theme-infographic .break-small td { background-color: #fde047 !important; color: #854d0e; text-shadow: none; letter-spacing: 2px; font-size: 18px;}
    .theme-infographic td span.sub-text { font-size: 16px; color: #334155; font-weight: 700; } 
    
    .doodle { display: none; }
    .theme-infographic .doodle { display: block; position: absolute; z-index: 1; user-select: none; }
    .d1 { top: 20px; left: 20px; font-size: 45px; transform: rotate(-15deg); } 
    .d2 { top: 20px; right: 20px; font-size: 55px; } 
    .d3 { bottom: 20px; left: 20px; font-size: 45px; transform: rotate(15deg); } 
    .d4 { bottom: 20px; right: 20px; font-size: 50px; transform: rotate(-10deg); } 
    .d5 { top: 120px; left: 15px; font-size: 35px; transform: rotate(-25deg); } 
    .d6 { top: 120px; right: 15px; font-size: 40px; transform: rotate(20deg); } 
    .d7 { bottom: 220px; left: 15px; font-size: 40px; transform: rotate(-10deg); } 
    .d8 { bottom: 220px; right: 15px; font-size: 45px; transform: rotate(15deg); } 

    /* 3. GIAO DIỆN CHUYÊN NGHIỆP (XANH NAVY) */
    .theme-blue { background: #f8fafc; padding: 25px; border-radius: 20px; border: 2px solid #bae6fd; position: relative; }
    .theme-blue .tkb-title { color: #0369a1; font-size: 28px; font-weight: 900; text-align: center; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;}
    .theme-blue .info-subtitle { display: none; }
    .theme-blue .doodle { display: none; }
    .theme-blue table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 12px; overflow: hidden; border: 2px solid #bae6fd; position: relative; z-index: 2;}
    .theme-blue th, .theme-blue td { border: 1px solid #e0f2fe; padding: 15px 10px; text-align: center; }
    .theme-blue th { color: #fff; font-weight: 800; font-size: 17px; background: #0284c7; }
    .theme-blue td { font-size: 16px; line-height: 1.5; color: #0f172a; font-weight: 800; background: #fff;}
    .theme-blue .time-col { color: #0284c7; background: #f0f9ff;} 
    .theme-blue .break-row td { background-color: #bfdbfe; font-weight: 900; color: #075985; letter-spacing: 3px; font-size: 15px;}
    .theme-blue .break-small td { background-color: #e0f2fe; color: #0284c7; letter-spacing: 2px; font-size: 14px;}
    .theme-blue td span.sub-text { font-size: 14px; color: #64748b; font-weight: 600; }

    /* 4. GIAO DIỆN KẸO NGỌT (HỒNG PASTEL) */
    .theme-pink { background: #fdf2f8; padding: 25px; border-radius: 20px; border: 3px dashed #fbcfe8; position: relative; }
    .theme-pink .tkb-title { color: #be185d; font-size: 30px; font-weight: 900; text-align: center; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; font-family: 'Pangolin', cursive;}
    .theme-pink .info-subtitle { display: none; }
    .theme-pink .doodle { display: none; }
    .theme-pink table { width: 100%; border-collapse: separate; border-spacing: 5px; position: relative; z-index: 2;}
    .theme-pink th, .theme-pink td { border-radius: 10px; padding: 15px 10px; text-align: center; }
    .theme-pink th { color: #fff; font-weight: 800; font-size: 18px; background: #f472b6; }
    .theme-pink td { font-size: 16px; line-height: 1.5; color: #831843; font-weight: 800; background: #fff; border: 2px solid #fce7f3;}
    .theme-pink .time-col { color: #be185d; background: #fce7f3;} 
    .theme-pink .break-row td { background-color: #fbcfe8; font-weight: 900; color: #9d174d; letter-spacing: 3px; font-size: 15px; border: none;}
    .theme-pink .break-small td { background-color: #fce7f3; color: #be185d; letter-spacing: 2px; font-size: 14px; border: none;}
    .theme-pink td span.sub-text { font-size: 14px; color: #9d174d; font-weight: 600; }

    /* 5. GIAO DIỆN THIÊN NHIÊN (XANH LÁ MỘC) */
    .theme-nature { background: #fefce8; padding: 25px; border-radius: 20px; border: 2px solid #d9f99d; position: relative; }
    .theme-nature .tkb-title { color: #4d7c0f; font-size: 28px; font-weight: 900; text-align: center; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; }
    .theme-nature .info-subtitle { display: none; }
    .theme-nature .doodle { display: none; }
    .theme-nature table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 15px; overflow: hidden; border: 2px solid #d9f99d; position: relative; z-index: 2;}
    .theme-nature th, .theme-nature td { border: 1px solid #ecfccb; padding: 15px 10px; text-align: center; }
    .theme-nature th { color: #fff; font-weight: 800; font-size: 17px; background: #84cc16; }
    .theme-nature td { font-size: 16px; line-height: 1.5; color: #3f6212; font-weight: 800; background: #fff;}
    .theme-nature .time-col { color: #4d7c0f; background: #f7fee7;} 
    .theme-nature .break-row td { background-color: #d9f99d; font-weight: 900; color: #3f6212; letter-spacing: 3px; font-size: 15px;}
    .theme-nature .break-small td { background-color: #ecfccb; color: #4d7c0f; letter-spacing: 2px; font-size: 14px;}
    .theme-nature td span.sub-text { font-size: 14px; color: #65a30d; font-weight: 600; }

    .tools { display: none; justify-content: center; gap: 15px; margin-top: 30px; }
    .btn-excel { background-color: #10b981; box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);}
    .btn-excel:hover { background-color: #059669; }
    
    .edit-hint { text-align: center; color: #0ea5e9; font-weight: 800; font-size: 16px; margin-top: 15px; display: none; animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="container">
    <div class="decal decal-1 floating-icon delay-1">✨</div>
    <div class="decal decal-2 floating-icon delay-2">🪴</div>

    <h2>🏫 THỜI KHÓA BIỂU SKY-LINE</h2>
    <div style="text-align: center;"><div class="badge">🌟 Không Gian Tiện Ích Giáo Viên Skyline 🌟</div></div>
    
    <div class="control-panel">
      <label for="excelUpload" class="upload-btn">☁️ Tải lên các File TKB (Tiểu học, THCS, THPT)</label>
      <input type="file" id="excelUpload" accept=".xlsx, .xls" multiple />
      <div id="uploadStatus" style="margin-top: 18px; font-weight: 800; color: #0f766e; font-size: 16px;">👋 Xin chào! Hãy chọn cùng lúc nhiều file TKB để tải lên nhé.</div>

      <div class="search-box" id="searchBox">
        <input type="text" id="teacherInput" placeholder="Tên Giáo viên / Trợ giảng..." list="teacherList">
        <datalist id="teacherList"></datalist>
        <button class="action-btn" onclick="processSearch('teacher')">👨‍🏫 Tra GV</button>
        
        <input type="text" id="classInput" placeholder="Tên Lớp..." list="classList">
        <datalist id="classList"></datalist>
        <button class="action-btn btn-class" onclick="processSearch('class')">🎒 Tra Lớp</button>
      </div>
    </div>

    <!-- MENU CHỌN GIAO DIỆN -->
    <div class="theme-toggle" id="themeToggle">
      <button id="btnSimple" class="t-btn active" onclick="switchTheme('simple')">📄 Bản Chuẩn</button>
      <button id="btnInfo" class="t-btn" onclick="switchTheme('infographic')">🎨 Bản Sketchnote</button>
      <button id="btnBlue" class="t-btn" onclick="switchTheme('blue')">💼 Bản Chuyên Nghiệp</button>
      <button id="btnPink" class="t-btn" onclick="switchTheme('pink')">🌸 Bản Kẹo Ngọt</button>
      <button id="btnNature" class="t-btn" onclick="switchTheme('nature')">🌿 Bản Mộc</button>
    </div>

    <div id="captureContainer" style="display:none;">
      <div id="captureArea" class="theme-simple">
        <div class="doodle d1 floating-icon">📚</div>
        <div class="doodle d2 floating-icon delay-1">🌈</div>
        <div class="doodle d3 floating-icon delay-2">🌱</div>
        <div class="doodle d4 floating-icon">🚀</div>
        <div class="doodle d5 floating-icon delay-1">⭐</div>
        <div class="doodle d6 floating-icon">💡</div>
        <div class="doodle d7 floating-icon delay-2">✏️</div>
        <div class="doodle d8 floating-icon delay-1">📐</div>

        <h1 class="tkb-title" id="displayTitle">THỜI KHÓA BIỂU</h1>
        <div class="info-subtitle" id="displaySubtitle"></div>
        <div id="printContent"></div>
      </div>
    </div>
    
    <div class="edit-hint" id="editHint">💡 Mẹo: Bấm trực tiếp vào các ô chữ trong bảng trên để chỉnh sửa/xóa thủ công trước khi tải ảnh!</div>

    <div class="tools" id="exportTools">
      <button class="action-btn" id="btnSaveImg" onclick="downloadImage()">🖼️ Lưu Hình Ảnh TKB</button>
      <button class="action-btn btn-excel" onclick="exportSimpleExcel()">📗 Tải Excel Siêu Gọn</button>
    </div>
  </div>

  <script>
    let allTimetableDict = {}; 
    let allTimeMaps = {}; 
    let currentQuery = "";
    let currentTheme = 'simple';
    let currentResultGrid = null;
    let isOnlyPrimary = true; 
    
    function ExcelDateToJSDate(serial) {
        if (!serial || isNaN(serial)) return null;
        var utc_days  = Math.floor(serial - 25569);
        var utc_value = utc_days * 86400;                                        
        var date_info = new Date(utc_value * 1000);
        return date_info.getUTCDate() + "/" + (date_info.getUTCMonth() + 1); // Trả về chuẩn Ngày/Tháng (Lớp/Khối)
    }

    document.getElementById('excelUpload').addEventListener('change', async function(e) {
      const files = e.target.files;
      if (!files || files.length === 0) return;
      
      document.getElementById('uploadStatus').innerHTML = "<span class='floating-icon'>⏳</span> Đang phân tích đa tầng. Xin đợi chút...";
      
      allTimetableDict = {};
      allTimeMaps = {};
      isOnlyPrimary = true; 
      let globalTeachersSet = new Set();
      let globalClassesSet = new Set();

      try {
        for (let i = 0; i < files.length; i++) {
          await processSingleFile(files[i], globalTeachersSet, globalClassesSet);
        }
        
        document.getElementById('teacherList').innerHTML = Array.from(globalTeachersSet).sort().map(t => `<option value="${t}">`).join('');
        document.getElementById('classList').innerHTML = Array.from(globalClassesSet).sort().map(c => `<option value="${c}">`).join('');
        
        document.getElementById('uploadStatus').innerText = `✅ Đã gộp thành công dữ liệu toàn trường! Mời tra cứu.`;
        document.getElementById('searchBox').style.display = "flex";

      } catch (error) {
        alert("Lỗi khi đọc file: Vui lòng kiểm tra lại cấu trúc Excel.");
        document.getElementById('uploadStatus').innerText = "❌ Lỗi đọc file. Vui lòng thử lại.";
      }
    });

    function processSingleFile(file, teachersSet, classesSet) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array', cellDates: false}); 
            
            workbook.SheetNames.forEach(sheetName => {
              const sheet = workbook.Sheets[sheetName];
              const excelData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: "", raw: true}); 
              
              let headerRowIndex = -1; let startCol = -1; let step = 3; let isPrimarySheet = false;
              let gvOffset = 1; let tgOffset = -1; 

              let topRowsText = excelData.slice(0, 10).flat().join(" ").toUpperCase();
              if (topRowsText.includes("TRUNG HỌC") || topRowsText.includes("THCS") || topRowsText.includes("THPT")) {
                  isOnlyPrimary = false;
              }

              for (let r = 0; r < Math.min(20, excelData.length); r++) {
                  let row = excelData[r] || [];
                  let monIndex = -1;
                  for (let i = 0; i < row.length; i++) {
                      let cellVal = row[i] ? row[i].toString().trim().toUpperCase() : "";
                      if (cellVal === "MÔN" || cellVal === "MÔN HỌC") {
                          monIndex = i; break;
                      }
                  }
                  
                  if (monIndex !== -1) {
                      for (let j = 1; j <= 3; j++) {
                          let nextCell = row[monIndex+j] ? row[monIndex+j].toString().trim().toUpperCase() : "";
                          if (nextCell === "GVGD" || nextCell === "GV" || nextCell === "GIÁO VIÊN" || nextCell.includes("GV")) {
                              headerRowIndex = r;
                              startCol = monIndex;
                              gvOffset = j; 
                              break;
                          }
                      }
                      
                      if (headerRowIndex !== -1) {
                          for (let i = monIndex + 1; i < row.length; i++) {
                              let tempVal = row[i] ? row[i].toString().trim().toUpperCase() : "";
                              if (tempVal === "MÔN" || tempVal === "MÔN HỌC") {
                                  step = i - monIndex;
                                  break;
                              }
                          }
                          for (let k = 1; k < step; k++) {
                              let cellK = row[monIndex+k] ? row[monIndex+k].toString().trim().toUpperCase() : "";
                              if (cellK === "TG" || cellK === "GVTG" || cellK === "TRỢ GIẢNG" || cellK === "TA") {
                                  tgOffset = k;
                                  break;
                              }
                          }
                          if (step === 2 || step === 3) isPrimarySheet = true; else isPrimarySheet = false;
                          break;
                      }
                  }
              }

              if (headerRowIndex === -1) return; 

              let localClassesMap = {};
              for (let r = headerRowIndex - 1; r >= Math.max(0, headerRowIndex - 8); r--) {
                  let row = excelData[r] || [];
                  for (let c = startCol; c < row.length; c += step) {
                      if (localClassesMap[c]) continue; 
                      
                      let rawVal = row[c];
                      if (rawVal === undefined || rawVal === null || rawVal === "") continue;
                      
                      let val = rawVal.toString().trim();
                      
                      if (typeof rawVal === 'number' && rawVal > 40000 && rawVal < 50000) {
                          val = ExcelDateToJSDate(rawVal);
                      }

                      let upperVal = val.toUpperCase();
                      if (upperVal.includes("LỚP") || upperVal.includes("KHỐI")) {
                          val = upperVal.split('\n')[0].replace(/L[ỚO]P/g, "").replace(/KH[ỐO]I/g, "").trim();
                      }
                      
                      let dMatch1 = val.match(/^20\d{2}[\/\-](\d{1,2})[\/\-](\d{1,2})/); 
                      let dMatch2 = val.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-]20\d{2}/); 
                      if (dMatch1) val = parseInt(dMatch1[2]) + "/" + parseInt(dMatch1[1]); 
                      else if (dMatch2) val = parseInt(dMatch2[1]) + "/" + parseInt(dMatch2[2]);
                      
                      // CHUYỂN TẤT CẢ DẤU CHẤM/GẠCH NGANG THÀNH XUYỆT (Bảo kê cho 4.5, 4-5)
                      val = val.replace(/[\.\-]/g, "/");
                      val = val.replace(/\s*\/\s*/g, "/");

                      let isValidClass = /^([1-9]|1[0-2])(?!\d)/i.test(val);
                      
                      if (isValidClass && !val.toUpperCase().includes("CN:")) {
                          localClassesMap[c] = val.toUpperCase();
                          classesSet.add(val.toUpperCase());
                      }
                  }
              }

              let dataStartIndex = headerRowIndex + 1;
              let currentDay = "";
              let currentBuoi = "sáng";
              let lastTeacher = {}; 

              const hasLetterRegex = /[a-zA-ZÀ-ỹ\u00C0-\u1EF9]/;

              for (let r = dataStartIndex; r < excelData.length; r++) {
                  let row = excelData[r] || [];
                  
                  let rowTextCheck = row.slice(0, 5).join(" ").toUpperCase();
                  if (rowTextCheck.includes("TỔNG") || rowTextCheck.includes("GHI CHÚ") || rowTextCheck.includes("THỐNG KÊ")) {
                      break; 
                  }

                  for(let c=0; c<=2; c++) {
                      let val = row[c] ? row[c].toString().trim() : "";
                      if (["Hai", "Ba", "Tư", "Năm", "Sáu"].includes(val)) { currentDay = val; break; }
                  }

                  if (isPrimarySheet) {
                      for(let c=0; c<=2; c++) {
                          let val = row[c] ? row[c].toString().trim().toLowerCase() : "";
                          if (val === "sáng" || val === "chiều") { currentBuoi = val; break; }
                      }
                  }

                  let periodStr = ""; let timeStr = "";
                  
                  let scanLimit = startCol > 0 ? startCol : 5; 
                  for (let c=0; c < scanLimit; c++) {
                      let val = row[c] ? row[c].toString().trim() : "";
                      if (!periodStr && /^([1-9]|1[0-2])$/.test(val)) periodStr = val;
                      if (!timeStr && /^\d{1,2}[:h]\d{2}/i.test(val)) timeStr = val; 
                  }

                  if (periodStr && currentDay) {
                      let absolutePeriod = periodStr;
                      if (isPrimarySheet && currentBuoi === "chiều" && parseInt(periodStr) < 5) {
                          absolutePeriod = (parseInt(periodStr) + 4).toString();
                      }
                      
                      if (timeStr && !allTimeMaps[absolutePeriod]) allTimeMaps[absolutePeriod] = timeStr;

                      for (let colIndex in localClassesMap) {
                          let c = parseInt(colIndex);
                          let subject = row[c] ? row[c].toString().trim() : "";
                          let teacher = row[c + gvOffset] ? row[c + gvOffset].toString().trim() : "";
                          
                          if (tgOffset !== -1) {
                              let assistant = row[c + tgOffset] ? row[c + tgOffset].toString().trim() : "";
                              if (assistant && !/^[\d\.\-]+$/.test(assistant) && !assistant.toLowerCase().includes("lab") && !assistant.toLowerCase().includes("phòng")) {
                                  teacher = teacher ? (teacher + " - " + assistant) : assistant;
                              }
                          }
                          
                          if (isPrimarySheet) {
                              if (subject && !teacher) teacher = lastTeacher[c] || "";
                              if (teacher) lastTeacher[c] = teacher;
                              else if (!subject) lastTeacher[c] = "";
                          }

                          let isGarbage = !hasLetterRegex.test(subject) && !hasLetterRegex.test(teacher);
                          
                          if (/^\d+$/.test(subject.toString().trim()) || /^\d+$/.test(teacher.toString().trim())) {
                              isGarbage = true;
                          }

                          if ((subject || teacher) && !isGarbage) {
                              let finalClassName = localClassesMap[c] || "[Lớp ẩn]";
                              let eventKey = finalClassName === "[Lớp ẩn]" ? `[Lớp ẩn]_${currentDay}_${absolutePeriod}_${c}` : `${finalClassName}_${currentDay}_${absolutePeriod}`;
                              
                              // BẢN VÁ: CHỈ ƯU TIÊN SHEET CÓ DỮ LIỆU ĐẦU TIÊN (FIRST SHEET WINS)
                              // Giúp bảo toàn lịch gốc, không bị các sheet cũ nằm ở phía sau ghi đè bậy bạ
                              if (!allTimetableDict[eventKey] || allTimetableDict[eventKey].className === "[Lớp ẩn]") {
                                  allTimetableDict[eventKey] = {
                                      day: currentDay,
                                      period: absolutePeriod,
                                      className: finalClassName,
                                      subject: subject,
                                      teacher: teacher
                                  };
                              }
                              
                              let cleanTeacherForSet = teacher.replace(/^(cô|thầy|gv|gvcn)\s*[:\-\.]?\s+/ig, "").trim();
                              let splitT = cleanTeacherForSet.split(/[\/\-,\+\(\)]/).map(t => t.trim()).filter(t => t !== "");
                              splitT.forEach(t => {
                                  if (hasLetterRegex.test(t)) teachersSet.add(t);
                              });
                          }
                      }
                      
                      for (let c = startCol; c < row.length; c += step) {
                          if (!localClassesMap[c]) {
                             let subject = row[c] ? row[c].toString().trim() : "";
                             let teacher = row[c + gvOffset] ? row[c + gvOffset].toString().trim() : "";
                             
                             let isGarbage = !hasLetterRegex.test(subject) && !hasLetterRegex.test(teacher);
                             if (/^\d+$/.test(subject.toString().trim()) || /^\d+$/.test(teacher.toString().trim())) {
                                 isGarbage = true;
                             }
                             
                             if ((subject || teacher) && !isGarbage) {
                                 let eventKey = `[Lớp ẩn]_${currentDay}_${absolutePeriod}_${c}`;
                                 
                                 if (!allTimetableDict[eventKey]) {
                                     allTimetableDict[eventKey] = {
                                          day: currentDay,
                                          period: absolutePeriod,
                                          className: "[Lớp ẩn]",
                                          subject: subject,
                                          teacher: teacher
                                      };
                                 }
                                  
                                  let cleanTeacherForSet = teacher.replace(/^(cô|thầy|gv|gvcn)\s*[:\-\.]?\s+/ig, "").trim();
                                  let splitT = cleanTeacherForSet.split(/[\/\-,\+\(\)]/).map(t => t.trim()).filter(t => t !== "");
                                  splitT.forEach(t => {
                                      if (hasLetterRegex.test(t)) teachersSet.add(t);
                                  });
                             }
                          }
                      }
                      
                  } else {
                      if (isPrimarySheet) lastTeacher = {}; 
                  }
              }
            });
            resolve();
          } catch (err) { reject(err); }
        };
        reader.readAsArrayBuffer(file);
      });
    }

    function processSearch(mode) {
      currentQuery = mode === 'teacher' ? document.getElementById('teacherInput').value.trim() : document.getElementById('classInput').value.trim().toUpperCase();
      if (!currentQuery) { alert("Vui lòng nhập từ khóa!"); return; }

      var allTimetableEvents = Object.values(allTimetableDict);
      var days = ["Hai", "Ba", "Tư", "Năm", "Sáu"];
      var grid = {}; 
      
      var periodsSet = new Set(["1", "2", "3", "4", "5", "6", "7", "8"]);
      allTimetableEvents.forEach(e => periodsSet.add(e.period));
      periodsSet.forEach(p => grid[p] = {"Hai": "", "Ba": "", "Tư": "", "Năm": "", "Sáu": ""});
      
      if (isOnlyPrimary) {
          allTimeMaps["1"] = "08:15 - 08:50";
          allTimeMaps["2"] = "08:55 - 09:30";
          allTimeMaps["3"] = "09:45 - 10:20";
          allTimeMaps["4"] = "10:25 - 11:00";
          allTimeMaps["5"] = "13:30 - 14:05";
          allTimeMaps["6"] = "14:10 - 14:45";
          allTimeMaps["7"] = "15:05 - 15:40";
          allTimeMaps["8"] = "15:45 - 16:20";
      }

      var found = false;

      allTimetableEvents.forEach(event => {
        let isMatch = false;
        
        if (mode === 'teacher') {
            let queryLower = currentQuery.toLowerCase();
            let teacherLower = event.teacher.toLowerCase();
            
            let cleanTeacher = teacherLower.replace(/^(cô|thầy|gv|gvcn)\s*[:\-\.]?\s+/g, "").trim();
            let teachersInCell = cleanTeacher.split(/[\/\-,\+\(\)]/).map(t => t.trim()).filter(t => t !== "");
            
            if (cleanTeacher === queryLower || teachersInCell.includes(queryLower)) {
                isMatch = true;
            }
        } 
        else if (mode === 'class') {
            let normalizedQuery = currentQuery.replace(/\s*[\.\-]\s*/g, "/").toUpperCase();
            let normalizedClass = event.className.replace(/\s*[\.\-]\s*/g, "/").toUpperCase();
            if (normalizedClass === normalizedQuery && event.subject !== "") {
                isMatch = true;
            }
        }

        if (isMatch) {
            let val = "";
            if (mode === 'teacher') val = `<strong>${event.className}</strong><br><span class="sub-text">(${event.subject})</span>`;
            else val = `<strong>${event.subject}</strong><br><span class="sub-text">(${event.teacher})</span>`;
            
            if (grid[event.period][event.day] && !grid[event.period][event.day].includes(val)) {
                grid[event.period][event.day] += "<hr style='margin:6px 0; border:0; border-top:1px dashed #cbd5e1;'>" + val;
            } else if (!grid[event.period][event.day]) {
                grid[event.period][event.day] = val;
            }
            found = true;
        }
      });

      if (!found) { alert("Không tìm thấy dữ liệu cho khóa tìm kiếm này."); return; }
      
      var periods = Array.from(periodsSet).sort((a, b) => parseInt(a) - parseInt(b));
      var filteredPeriods = periods.filter(p => {
          let pNum = parseInt(p);
          if (pNum <= 8) return true; 
          return days.some(d => grid[p] && grid[p][d] !== "");
      });

      currentResultGrid = { grid, timeMap: allTimeMaps, periods: filteredPeriods, days };
      renderTable();
    }

    function switchTheme(themeType) {
      currentTheme = themeType;
      var captureArea = document.getElementById('captureArea');
      
      document.querySelectorAll('.t-btn').forEach(btn => btn.classList.remove('active'));
      captureArea.className = 'theme-' + themeType;
      
      if(themeType === 'simple') {
        document.getElementById('btnSimple').classList.add('active');
        document.getElementById('displayTitle').innerText = `TKB: ${currentQuery.toUpperCase()}`;
      } else if (themeType === 'infographic') {
        document.getElementById('btnInfo').classList.add('active');
        document.getElementById('displayTitle').innerText = `THỜI KHÓA BIỂU`;
        document.getElementById('displaySubtitle').innerHTML = `Hệ Thống Giáo Dục Sky-Line • Lịch của: <strong>${currentQuery.toUpperCase()}</strong>`;
      } else if (themeType === 'blue') {
        document.getElementById('btnBlue').classList.add('active');
        document.getElementById('displayTitle').innerText = `LỊCH GIẢNG DẠY: ${currentQuery.toUpperCase()}`;
      } else if (themeType === 'pink') {
        document.getElementById('btnPink').classList.add('active');
        document.getElementById('displayTitle').innerText = `🎀 TKB CỦA ${currentQuery.toUpperCase()} 🎀`;
      } else if (themeType === 'nature') {
        document.getElementById('btnNature').classList.add('active');
        document.getElementById('displayTitle').innerText = `TKB: ${currentQuery.toUpperCase()}`;
      }
    }

    function renderTable() {
      switchTheme(currentTheme); 
      var { grid, timeMap, periods, days } = currentResultGrid;
      var html = '<table><tr><th style="width: 120px;">Tiết/Thứ</th><th>Thứ 2</th><th>Thứ 3</th><th>Thứ 4</th><th>Thứ 5</th><th>Thứ 6</th></tr>';
      
      periods.forEach(p => {
        var timeStr = timeMap[p] ? `<br><span class="sub-text">(${timeMap[p]})</span>` : '';
        html += `<tr><td class="time-col">Tiết ${p}${timeStr}</td>`;
        
        days.forEach(d => { 
            let cellData = grid[p][d];
            html += `<td contenteditable="true" spellcheck="false" class="editable-cell" title="Click để sửa chữ">${cellData}</td>`; 
        });
        
        html += '</tr>';
        
        if (isOnlyPrimary) {
            if (p === "2") html += '<tr class="break-row break-small"><td colspan="6" contenteditable="true">🍵 NGHỈ GIẢI LAO (09:30 - 09:45) 🍵</td></tr>';
            if (p === "4") html += '<tr class="break-row"><td colspan="6" contenteditable="true">🍲 NGHỈ TRƯA 🍲</td></tr>';
            if (p === "6") html += '<tr class="break-row break-small"><td colspan="6" contenteditable="true">🥪 NGHỈ GIẢI LAO - ĂN XẾ (14:45 - 15:05) 🥪</td></tr>';
        } else {
            if (p === "4") html += '<tr class="break-row"><td colspan="6" contenteditable="true">⭐ NGHỈ TRƯA ⭐</td></tr>';
        }
      });
      
      html += '</table>';
      document.getElementById('printContent').innerHTML = html;
      document.getElementById('themeToggle').style.display = 'flex';
      document.getElementById('captureContainer').style.display = 'block';
      document.getElementById('exportTools').style.display = 'flex';
      document.getElementById('editHint').style.display = 'block'; 
    }

    function exportSimpleExcel() {
      var { grid, timeMap, periods, days } = currentResultGrid;
      var aoa = [["Tiết / Thứ", "Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6"]];
      
      periods.forEach(p => {
        var row = [];
        var timeStr = timeMap[p] ? `(${timeMap[p]})` : "";
        row.push(`Tiết ${p}\n${timeStr}`);
        days.forEach(d => {
          var textVal = grid[p][d].replace(/<strong>/g, "").replace(/<\/strong>/g, "")
                                  .replace(/<span.*?>/g, "").replace(/<\/span>/g, "")
                                  .replace(/<hr.*?>/g, "\n---\n").replace(/<br>/g, "\n");
          row.push(textVal);
        });
        aoa.push(row);
        if (isOnlyPrimary) {
            if (p === "2") aoa.push(["NGHỈ GIẢI LAO", null, null, null, null, null]);
            if (p === "4") aoa.push(["ĂN TRƯA - NGHỈ TRƯA", null, null, null, null, null]);
            if (p === "6") aoa.push(["NGHỈ GIẢI LAO - ĂN XẾ", null, null, null, null, null]);
        } else {
            if (p === "4") aoa.push(["GIỜ NGHỈ TRƯA", null, null, null, null, null]);
        }
      });

      var wb = XLSX.utils.book_new();
      var ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [ {wch: 15}, {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18}, {wch: 18} ];

      XLSX.utils.book_append_sheet(wb, ws, "TKB");
      XLSX.writeFile(wb, `TKB_SkyLine_${currentQuery}.xlsx`);
    }

    function downloadImage() {
      var captureDiv = document.getElementById('captureArea');
      
      var bgColorMap = {
          'simple': '#ffffff',
          'infographic': '#fffde7',
          'blue': '#f8fafc',
          'pink': '#fdf2f8',
          'nature': '#fefce8'
      };
      var bgColor = bgColorMap[currentTheme] || '#ffffff'; 
      
      var icons = document.querySelectorAll('.floating-icon');
      icons.forEach(i => i.style.animation = 'none');

      html2canvas(captureDiv, { scale: 2, backgroundColor: bgColor }).then(canvas => {
        icons.forEach(i => i.style.animation = '');
        var base64Data = canvas.toDataURL("image/png");
        var link = document.createElement('a');
        link.download = `TKB_SkyLine_${currentQuery}.png`;
        link.href = base64Data;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    }
  </script>
